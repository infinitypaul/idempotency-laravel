name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - php: '8.1'
            laravel: '^10.0'
            testbench: '^8.0'
          - php: '8.2'
            laravel: '^10.0'
            testbench: '^8.0'
          - php: '8.3'
            laravel: '^10.0'
            testbench: '^8.0'

          - php: '8.2'
            laravel: '^11.0'
            testbench: '^9.0'
          - php: '8.3'
            laravel: '^11.0'
            testbench: '^9.0'
          - php: '8.4'
            laravel: '^11.0'
            testbench: '^9.0'

          - php: '8.2'
            laravel: '^12.0'
            testbench: '^10.0'
          - php: '8.3'
            laravel: '^12.0'
            testbench: '^10.0'
          - php: '8.4'
            laravel: '^12.0'
            testbench: '^10.0'

          - php: '8.3'
            laravel: '^13.0'
            testbench: '^11.0'
          - php: '8.4'
            laravel: '^13.0'
            testbench: '^11.0'

    name: PHP ${{ matrix.php }} - Laravel ${{ matrix.laravel }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, json
          coverage: none

      - name: Install dependencies
        run: |
          composer require "illuminate/support:${{ matrix.laravel }}" "illuminate/events:${{ matrix.laravel }}" "illuminate/http:${{ matrix.laravel }}" "orchestra/testbench:${{ matrix.testbench }}" --no-update
          composer update --prefer-dist --no-interaction --no-progress

      - name: Run unit and feature tests
        run: vendor/bin/phpunit

      - name: Run race condition test
        run: php tests/scripts/test_race_condition.php --count=5 --rounds=3
